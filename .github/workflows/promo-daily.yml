name: Daily promo scrape

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  scrape-promos:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BLIX_STORES: biedronka,lidl,kaufland,auchan

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get week number
        id: week
        run: echo "week=$(date +'%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Cache leaflet HTTP responses
        uses: actions/cache@v4
        with:
          path: promo-output/blix/cache/endpoints
          key: promo-endpoints-${{ steps.week.outputs.week }}
          restore-keys: |
            promo-endpoints-

      - name: Install dependencies
        run: npm ci

      - name: Check env variables
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "SUPABASE_URL missing"; exit 1; else echo "SUPABASE_URL OK"; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "SUPABASE_SERVICE_ROLE_KEY missing"; exit 1; else echo "SUPABASE_SERVICE_ROLE_KEY OK"; fi
      - name: Run promo pipeline
        run: npm run promo:daily
